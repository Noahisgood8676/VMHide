name: Build VMHide
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Build Solution
        run: msbuild VMHide.sln /p:Configuration=Release /p:Platform=x64
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMHide-DLL
          path: x64/Release/VMHide.dll
