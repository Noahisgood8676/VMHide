name: Build VMHide
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # This tells GitHub to grab missing library files

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # VCPKG is a tool that helps install missing C++ libraries like MinHook
      - name: Install MinHook via VCPKG
        run: vcpkg install minhook:x64-windows

      - name: Build Solution
        run: |
          msbuild VMHide.sln /p:Configuration=Release /p:Platform=x64 /p:ForceImportBeforeCppTargets="C:/vcpkg/scripts/buildsystems/msbuild/vcpkg.targets"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMHide-DLL
          path: |
            x64/Release/VMHide.dll
            VMHide/x64/Release/VMHide.dll
